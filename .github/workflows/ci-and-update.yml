name: CI & EAS Update

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format

  eas-update:
    name: EAS Update
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish update
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}"

  pr-preview:
    name: PR Preview
    needs: lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish update
        id: eas-update
        run: |
          BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
          MESSAGE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          eas update --branch "$BRANCH_NAME" --message "$MESSAGE" --json > update-output.json
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          GROUP_ID=$(jq -r '.[0].group' update-output.json)
          echo "group_id=$GROUP_ID" >> "$GITHUB_OUTPUT"

      - name: Generate QR code URL
        id: qr
        run: |
          PROJECT_ID="0384d7bc-46fe-4f87-ba0f-9c97ef0cad38"
          GROUP_ID="${{ steps.eas-update.outputs.group_id }}"
          BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
          UPDATE_URL="https://u.expo.dev/${PROJECT_ID}?channel-name=${BRANCH_NAME}"
          QR_URL="https://qr.expo.dev/eas-update?projectId=${PROJECT_ID}&groupId=${GROUP_ID}"
          EXPO_GO_URL="exp://u.expo.dev/update/${GROUP_ID}"
          echo "update_url=$UPDATE_URL" >> "$GITHUB_OUTPUT"
          echo "qr_url=$QR_URL" >> "$GITHUB_OUTPUT"
          echo "expo_go_url=$EXPO_GO_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: expo-preview
          message: |
            ## 📱 Expo Go Preview

            This PR has a live preview available in **Expo Go**.

            **Scan this QR code** to open the latest version on your device:

            <a href="${{ steps.qr.outputs.expo_go_url }}"><img src="${{ steps.qr.outputs.qr_url }}" alt="${{ steps.eas-update.outputs.branch }} QR code" width="250" /></a>

            **Or open directly:** [Open in Expo Go](${{ steps.qr.outputs.expo_go_url }})

            > Update branch: `${{ steps.eas-update.outputs.branch }}`
            > Updated on: ${{ github.event.pull_request.head.sha }}
