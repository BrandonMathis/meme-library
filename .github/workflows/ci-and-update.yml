name: CI & EAS Update

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format

      - name: TypeScript type-check
        run: npm run typecheck

      # TODO: Re-enable once expo-file-system duplicate is resolved
      # - name: Expo Doctor
      #   run: npx expo-doctor

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate

  reserve-pr-comment:
    name: Reserve PR Comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post placeholder comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: expo-preview
          message: |
            ## 📱 Expo Go Preview

            ⏳ **Building preview…** This comment will be updated with deployment details once the build is complete.

            <img src="https://placehold.co/250x250/e8e8e8/b0b0b0?text=%E2%8F%B3%0ABuilding+Preview..." alt="QR code loading" width="250" height="250" />

            **Open in Expo Go:** ⏳ _Pending…_

            ---

            ## 🌐 Web Preview

            ⏳ **Deploying web preview…** A link will appear here once the deployment is complete.

            > **Commit:** ${{ github.event.pull_request.head.sha }}
            >
            > Waiting for lint, tests, and EAS deploy to finish…

  eas-update:
    name: EAS Update
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: changes
        run: |
          CODE_CHANGES=$(git diff --name-only HEAD~1 HEAD -- \
            'app/' \
            'components/' \
            'context/' \
            'lib/' \
            'constants/' \
            'hooks/' \
            'assets/' \
            'scripts/' \
            '*.ts' \
            '*.tsx' \
            '*.js' \
            '*.jsx' \
            '*.json' \
            '*.css' \
            'global.css' \
            'tailwind.config.*' \
            'metro.config.*' \
            'app.json' \
            'app.config.*' \
            'eas.json' \
            'babel.config.*' \
            'tsconfig.*' \
            'nativewind-env.d.ts' \
          )
          if [ -n "$CODE_CHANGES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CODE_CHANGES"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No code changes detected, skipping EAS update"
          fi

      - name: Setup Node
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        if: steps.changes.outputs.has_changes == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: npm ci

      - name: Publish update
        if: steps.changes.outputs.has_changes == 'true'
        run: eas update --branch main --message "${{ github.event.head_commit.message }}"

  pr-preview:
    name: PR Preview
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: changes
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CODE_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'app/' \
            'components/' \
            'context/' \
            'lib/' \
            'constants/' \
            'hooks/' \
            'assets/' \
            'scripts/' \
            '*.ts' \
            '*.tsx' \
            '*.js' \
            '*.jsx' \
            '*.json' \
            '*.css' \
            'global.css' \
            'tailwind.config.*' \
            'metro.config.*' \
            'app.json' \
            'app.config.*' \
            'eas.json' \
            'babel.config.*' \
            'tsconfig.*' \
            'nativewind-env.d.ts' \
          )
          if [ -n "$CODE_CHANGES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CODE_CHANGES"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No code changes detected, skipping EAS update"
          fi

      - name: Setup Node
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        if: steps.changes.outputs.has_changes == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: npm ci

      - name: Publish update
        if: steps.changes.outputs.has_changes == 'true'
        id: eas-update
        run: |
          BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
          MESSAGE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          eas update --branch "$BRANCH_NAME" --message "$MESSAGE" --json > update-output.json
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          GROUP_ID=$(jq -r '.[0].group' update-output.json)
          echo "group_id=$GROUP_ID" >> "$GITHUB_OUTPUT"

      - name: Generate QR code URL
        if: steps.changes.outputs.has_changes == 'true'
        id: qr
        run: |
          PROJECT_ID="0384d7bc-46fe-4f87-ba0f-9c97ef0cad38"
          GROUP_ID="${{ steps.eas-update.outputs.group_id }}"
          BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
          UPDATE_URL="https://u.expo.dev/${PROJECT_ID}?channel-name=${BRANCH_NAME}"
          QR_URL="https://qr.expo.dev/eas-update?projectId=${PROJECT_ID}&groupId=${GROUP_ID}"
          PREVIEW_URL="https://expo.dev/preview/update?message=PR%20Preview&updateRuntimeVersion=1.0.0&createdAt=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)&slug=exp&projectId=${PROJECT_ID}&group=${GROUP_ID}"
          echo "update_url=$UPDATE_URL" >> "$GITHUB_OUTPUT"
          echo "qr_url=$QR_URL" >> "$GITHUB_OUTPUT"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: expo-preview
          message: |
            ## 📱 Expo Go Preview

            This PR has a live preview available in **Expo Go**.

            **Scan this QR code** to open the latest version on your device:

            <a href="${{ steps.qr.outputs.preview_url }}"><img src="${{ steps.qr.outputs.qr_url }}" alt="${{ steps.eas-update.outputs.branch }} QR code" width="250" /></a>

            **Or open directly:** [Open in Expo Go](${{ steps.qr.outputs.preview_url }})

            > Update branch: `${{ steps.eas-update.outputs.branch }}`
            > Updated on: ${{ github.event.pull_request.head.sha }}

      - name: Comment no changes
        if: steps.changes.outputs.has_changes != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: expo-preview
          message: |
            ## 📱 Expo Go Preview

            No code changes detected — skipped Expo Go preview update.

  web-preview:
    name: Web Preview
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: changes
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CODE_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'app/' \
            'components/' \
            'context/' \
            'lib/' \
            'constants/' \
            'hooks/' \
            'assets/' \
            'scripts/' \
            '*.ts' \
            '*.tsx' \
            '*.js' \
            '*.jsx' \
            '*.json' \
            '*.css' \
            'global.css' \
            'tailwind.config.*' \
            'metro.config.*' \
            'app.json' \
            'app.config.*' \
            'eas.json' \
            'babel.config.*' \
            'tsconfig.*' \
            'nativewind-env.d.ts' \
          )
          if [ -n "$CODE_CHANGES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CODE_CHANGES"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No code changes detected, skipping web preview"
          fi

      - name: Setup Node
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        if: steps.changes.outputs.has_changes == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: npm ci

      - name: Export for web
        if: steps.changes.outputs.has_changes == 'true'
        run: npx expo export --platform web

      - name: Deploy to EAS Hosting
        if: steps.changes.outputs.has_changes == 'true'
        id: deploy
        run: |
          ALIAS="pr-${{ github.event.pull_request.number }}"
          DEPLOY_OUTPUT=$(eas deploy --alias "$ALIAS" --non-interactive --json 2>/dev/null)
          echo "deploy_output=$DEPLOY_OUTPUT" >> "$GITHUB_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | jq -r '.deploymentUrl // .url // empty')
          ALIAS_URL=$(echo "$DEPLOY_OUTPUT" | jq -r '.aliasUrl // empty')
          DASHBOARD_URL=$(echo "$DEPLOY_OUTPUT" | jq -r '.dashboardUrl // empty')
          DEPLOY_ID=$(echo "$DEPLOY_OUTPUT" | jq -r '.id // .deploymentIdentifier // empty')
          # Use alias URL if available, otherwise deployment URL
          PREVIEW_URL="${ALIAS_URL:-$DEPLOY_URL}"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "alias_url=$ALIAS_URL" >> "$GITHUB_OUTPUT"
          echo "dashboard_url=$DASHBOARD_URL" >> "$GITHUB_OUTPUT"
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Web preview deployed to: $PREVIEW_URL"

      - name: Comment on PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: web-preview
          message: |
            ## 🌐 Web Preview

            This PR has a live **web preview** deployed via EAS Hosting.

            **🔗 [Open Web Preview](${{ steps.deploy.outputs.preview_url }})**

            > **Alias:** `pr-${{ github.event.pull_request.number }}`
            > **Deployment URL:** ${{ steps.deploy.outputs.deploy_url }}
            > **Commit:** ${{ github.event.pull_request.head.sha }}
            > **Dashboard:** [View in EAS Dashboard](${{ steps.deploy.outputs.dashboard_url }})

      - name: Comment no changes
        if: steps.changes.outputs.has_changes != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: web-preview
          message: |
            ## 🌐 Web Preview

            No code changes detected — skipped web preview deployment.

  web-deploy:
    name: Web Deploy (Production)
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: changes
        run: |
          CODE_CHANGES=$(git diff --name-only HEAD~1 HEAD -- \
            'app/' \
            'components/' \
            'context/' \
            'lib/' \
            'constants/' \
            'hooks/' \
            'assets/' \
            'scripts/' \
            '*.ts' \
            '*.tsx' \
            '*.js' \
            '*.jsx' \
            '*.json' \
            '*.css' \
            'global.css' \
            'tailwind.config.*' \
            'metro.config.*' \
            'app.json' \
            'app.config.*' \
            'eas.json' \
            'babel.config.*' \
            'tsconfig.*' \
            'nativewind-env.d.ts' \
          )
          if [ -n "$CODE_CHANGES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CODE_CHANGES"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No code changes detected, skipping web deploy"
          fi

      - name: Setup Node
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        if: steps.changes.outputs.has_changes == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: npm ci

      - name: Export for web
        if: steps.changes.outputs.has_changes == 'true'
        run: npx expo export --platform web

      - name: Deploy to EAS Hosting (production)
        if: steps.changes.outputs.has_changes == 'true'
        run: eas deploy --alias production --non-interactive
